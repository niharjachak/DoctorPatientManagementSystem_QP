spring.application.name=doctor-patient-system

# DATABASE CONFIG
spring.datasource.url=jdbc:mysql://localhost:3306/doctor_patient_db?createDatabaseIfNotExist=true
spring.datasource.username=your_db_username_here
spring.datasource.password=your_db_password_here

# JPA CONFIG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# FILE UPLOAD (IMAGE)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT CONFIG -- generating secret key and setting token validity to 1 day
jwt.secret= your_secret_key_here

# TIMEZONE - ensuring time saved and retrievd is same accross the system
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# LOGGING -- shows detailed logs for security
logging.level.org.springframework.security=DEBUG